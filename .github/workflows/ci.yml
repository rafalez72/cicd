
name: CI-CD

on:
  push:
    branches: [main]

# para que pueda ver dond e fall.
permissions:
  contents: read
  actions: read

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest         
    env:
      IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/utn-cicd

    steps:
      # Notifica mos el inicio.
      - name: Notificar inicio a Telegram
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          RUNID: ${{ github.run_id }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then
            echo "ℹ️  Faltan TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID -> notificación no enviada"
            exit 0
          fi
          MSG=$(printf '%s\n%s\n%s\n%s' \
            "arrancó la ejecución" \
            "por: $ACTOR" \
            "commit: $(echo "$SHA" | cut -c1-7)" \
            "run: https://github.com/$REPO/actions/runs/$RUNID")
          curl -fsS -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
            --data-urlencode "chat_id=$TG_CHAT" \
            --data-urlencode "text=$MSG"
          echo "Inicio enviada a Telegram"

      #reutilizamos un codigo/funcion de git
      - name: Checkout (control de versiones)
        uses: actions/checkout@v4

      
      - name: Build — construir imagen
        run: docker build -t $IMAGE:${{ github.run_number }} -t $IMAGE:latest .

      - name: Test — pruebas automatizadas
        run: docker run --rm $IMAGE:latest node --test test/

      # login dockerhub
      - name: Login a DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      
      - name: Push — publicar imagen en DockerHub
        run: |
          docker push $IMAGE:${{ github.run_number }}
          docker push $IMAGE:latest

      # aviso a render
      - name: Deploy a la web (Render)
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "🌐 Deploy en la web disparado (Render) -> https://utn-cicd-latest.onrender.com"

      # notifico que termino
      - name: Notificar a Telegram
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATUS: ${{ job.status }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          RUNID: ${{ github.run_id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then
            echo "ℹ️  Faltan TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID -> notificación no enviada"
            exit 0
          fi
          REASON=""
          if [ "$STATUS" = "success" ]; then
            ICON="✅"; WORD="se subió OK"
          else
            ICON="❌"; WORD="FALLÓ"
            # miramos donde fallo
            FAILED=$(curl -fsS \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/actions/runs/$RUNID/jobs" \
              | jq -r '[.jobs[].steps[] | select(.conclusion=="failure") | .name] | first // empty')
            [ -n "$FAILED" ] && REASON=$(printf '\nfalló en: %s' "$FAILED")
          fi
          MSG=$(printf '%s\n%s%s\n%s' \
            "$ICON CI/CD utn-cicd: $WORD" \
            "commit: $(echo "$SHA" | cut -c1-7)" \
            "$REASON" \
            "run: https://github.com/$REPO/actions/runs/$RUNID")
          curl -fsS -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
            --data-urlencode "chat_id=$TG_CHAT" \
            --data-urlencode "text=$MSG"
          echo "notificaicon enviada a a tg"
