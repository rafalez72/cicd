# ═══════════════════════════════════════════════════════════════════════════
#  ci.yml — EL PIPELINE DE INTEGRACIÓN Y ENTREGA CONTINUA
# ═══════════════════════════════════════════════════════════════════════════
#  Está escrito en sintaxis de GitHub Actions, pero lo ejecuta el runner
#  self-hosted de Gitea Actions (nuestro "servidor de IC", todo dockerizado).
#  Vive DENTRO del repositorio: el pipeline es "código" y se versiona junto a la app.
#
#  Flujo: Checkout -> Build -> Test -> Login -> Push (DockerHub) -> Deploy
# ───────────────────────────────────────────────────────────────────────────

name: CI-CD            # nombre del workflow (aparece en la pestaña Actions)

# ── CUÁNDO se dispara ──────────────────────────────────────────────────────
# Se ejecuta automáticamente en cada "push" a la rama main. Esa automatización
# (integrar = pushear -> se valida solo) es el corazón de la Integración Continua.
on:
  push:
    branches: [main]

# ── QUÉ hace ───────────────────────────────────────────────────────────────
jobs:
  build-test-deploy:
    # "runs-on" elige el tipo de máquina. La etiqueta ubuntu-latest está mapeada
    # (en runner/config.yaml) a una imagen Docker que ya trae Docker CLI + Node.
    runs-on: ubuntu-latest

    # Variables del job. Los "secrets" (usuario/token de DockerHub) se cargan en
    # Gitea y NUNCA se escriben en el código -> buena práctica de seguridad.
    env:
      # Imagen final publicada como  <tu-usuario-dockerhub>/utn-cicd
      IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/utn-cicd

    steps:
      # 1) CHECKOUT: trae el código del repositorio (control de versiones) al runner.
      - name: Checkout (control de versiones)
        uses: actions/checkout@v4

      # 2) BUILD: construye la imagen Docker. Le ponemos dos etiquetas:
      #    - una con el número de build (versión trazable: 1, 2, 3...)
      #    - "latest" (la más reciente)
      # Forzamos linux/amd64: el runner corre en Mac ARM, pero la nube (Render)
      # y la mayoría de los servidores usan amd64. Sin esto la imagen no arranca allá.
      - name: Build — construir imagen (linux/amd64)
        run: docker build --platform linux/amd64 -t $IMAGE:${{ github.run_number }} -t $IMAGE:latest .

      # 3) TEST: corre la prueba automatizada DENTRO de la imagen recién construida.
      #    Si falla, el pipeline se detiene acá y NO se despliega nada (calidad).
      - name: Test — pruebas automatizadas
        run: docker run --rm $IMAGE:latest node --test test/

      # 4) LOGIN: autentica contra DockerHub usando los secrets (sin exponer el token).
      - name: Login a DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # 5) PUSH: publica la imagen ya probada en DockerHub (el "registry" / repositorio
      #    de artefactos). Desde ahí cualquier entorno puede descargarla.
      - name: Push — publicar imagen en DockerHub
        run: |
          docker push $IMAGE:${{ github.run_number }}
          docker push $IMAGE:latest

      # 6) DEPLOY: despliega en el "entorno de entrega". Baja la imagen desde DockerHub
      #    (demuestra el circuito completo registry -> entorno) y la corre en el puerto
      #    8081. Antes elimina el contenedor viejo para reemplazarlo por la nueva versión.
      - name: Deploy — desplegar en entorno de entrega (:8081)
        run: |
          docker pull $IMAGE:latest
          docker rm -f demo-ci-prod || true
          docker run -d --name demo-ci-prod \
            -p 8081:3000 \
            -e APP_VERSION=${{ github.run_number }} \
            $IMAGE:latest
          echo "✅ Imagen publicada en DockerHub y app desplegada en http://localhost:8081"

      # 7) DEPLOY A LA WEB: avisa a Render (PaaS) que hay imagen nueva en DockerHub.
      #    Render baja rafalez72/utn-cicd:latest y la republica en una URL pública.
      #    Esto es el despliegue continuo al "entorno de entrega" en la web.
      #    El paso NO rompe el pipeline si todavía no cargaste el secret RENDER_DEPLOY_HOOK.
      - name: Deploy a la web (Render)
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
            echo "🌐 Deploy en la web disparado (Render)"
          else
            echo "ℹ️  Falta el secret RENDER_DEPLOY_HOOK -> deploy web no configurado todavía"
          fi
